<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillSwap Project</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f8f8;
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      color:var(--main-color);
      margin-bottom: 20px;
    }

    .project-img {
      max-width: 800px;
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 6px 18px var(--main-color);
      transition: 0.3s ease;
    }

    .project-img:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px var(--main-color);
    }

    .back-btn {
      margin-top: 30px;
      border-radius: 25px;
      padding: 10px 25px;
      transition: 0.3s ease;
    }

    .back-btn:hover {
      background: var(--main-color);
      border-color: var(--main-color);
      color: var(--main-color);
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <h1><span>SkillSwap Project</span></h1>

  <img src="image2.png" class="project-img" alt="SkillSwap UI">

  <br>

  <a href="index.html" class="btn btn-dark back-btn">
    ← Back to Projects
  </a>

</body>
</html>
